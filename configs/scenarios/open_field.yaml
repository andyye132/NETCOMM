# Open field: low path-loss, sparse, long range
env: open
area_xy: [0.0, 300.0, 0.0, 300.0]
z_range: [0.0, 40.0]
r_rng: 250.0
alpha_pl: 2.2
beta_pl: 1.0e-3
cluster_kappa: 0.5
m_0: 2.5
lambda_density: 3.0e-4
n_nodes: 12

# scenario-specific generation rates (low telemetry, video, urgent control)
pkt_rate_per_class: [10.0, 30.0, 5.0]

# energy proxy weights (relative cost per action used by the cost term)
energy_proxy_weights:
  react: 1.0
  predict: 1.1
  diversify: 1.6
  drop: 0.0
